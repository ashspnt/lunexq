name: Lunes-Keep

on:
  workflow_dispatch:
  schedule:
    - cron: '24 3 */10 * *'   # 北京时间 09:00（UTC+8 → UTC 01:00）

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Lunes-Keep-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/lunes_keep.py lunes_keep.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛠️ 准备 Gost 工具
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          echo "✅ Gost 已就绪"

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          LUNES_ACCOUNTS: ${{ secrets.LUNES_ACCOUNTS }}
          TG_BOT:         ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python lunes_keep.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
